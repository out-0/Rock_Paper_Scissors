<!DOCTYPE html>
<html lang="en">
<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Rock Paper Scissors</title>
		<script src="js/script.js" defer></script>
		<link rel="stylesheet" href="css/styles.css">
</head>
<body>
	<h1 class="title"><em><i>Welcome</i></em></h1>
	<h2 class="title game-title">Rock Paper Scissors</h2>
	<img src="image/game.jpg" alt="game image" class="game-image">

	<p>Press Your Choice</p>
	<div class="buttons">
		<button class="choice" data-choice="rock">Rock</button>
		<button class="choice" data-choice="paper">Paper</button>
		<button class="choice" data-choice="scissors">Scissors</button>
	</div>
	<p>The rules is simple</p>
	<div class="rules-section">
		<img src="image/rules.webp" alt="rules image" class="rules-image">
		<ul>
			<li>Rock beats Scissors</li>
			<li>Scissors beats Paper</li>
			<li>Paper beats Rock</li>
		</ul>
		
	</div>
	<p><em><i>Good Luck</em></i></p>
</body>
</html>
